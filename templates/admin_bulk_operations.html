<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Operations - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <div class="bg-white rounded-xl shadow-lg p-8">
            <h1 class="text-3xl font-bold mb-6">
                <i class="fas fa-layer-group text-blue-600 mr-2"></i>Bulk Operations
            </h1>

            <!-- Bulk CC Check -->
            <div class="mb-8">
                <h2 class="text-xl font-bold mb-4">Bulk Credit Card Checking</h2>
                <div class="bg-gray-50 p-6 rounded-lg">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Upload Card List (TXT/CSV)</label>
                        <textarea rows="10" placeholder="4400662138120147|10|27|075&#10;4400662138120148|11|28|123&#10;..." class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 font-mono text-sm"></textarea>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Shop URL</label>
                            <input type="text" placeholder="https://shop-name.myshopify.com" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Proxy (Optional)</label>
                            <input type="text" placeholder="host:port:user:pass" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                    <div class="flex space-x-4">
                        <button class="gradient-bg text-white px-8 py-3 rounded-lg font-semibold hover:opacity-90">
                            <i class="fas fa-play mr-2"></i>Start Bulk Check
                        </button>
                        <button class="bg-gray-200 text-gray-700 px-8 py-3 rounded-lg font-semibold hover:bg-gray-300">
                            <i class="fas fa-file-import mr-2"></i>Import from File
                        </button>
                    </div>
                </div>
            </div>

            <!-- Bulk Site Testing -->
            <div class="mb-8">
                <h2 class="text-xl font-bold mb-4">Bulk Site Testing</h2>
                <div class="bg-gray-50 p-6 rounded-lg">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Upload Site List</label>
                        <textarea rows="5" placeholder="https://shop1.myshopify.com&#10;https://shop2.myshopify.com&#10;..." class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 font-mono text-sm"></textarea>
                    </div>
                    <button class="bg-blue-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-blue-700">
                        <i class="fas fa-globe mr-2"></i>Test All Sites
                    </button>
                </div>
            </div>

            <!-- Bulk Proxy Testing -->
            <div class="mb-8">
                <h2 class="text-xl font-bold mb-4">Bulk Proxy Testing</h2>
                <div class="bg-gray-50 p-6 rounded-lg">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Upload Proxy List</label>
                        <textarea rows="5" placeholder="host:port:user:pass&#10;host:port:user:pass&#10;..." class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 font-mono text-sm"></textarea>
                    </div>
                    <button class="bg-purple-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-purple-700">
                        <i class="fas fa-random mr-2"></i>Test All Proxies
                    </button>
                </div>
            </div>

            <!-- Export Data -->
            <div class="mb-8">
                <h2 class="text-xl font-bold mb-4">Export Data</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <button class="bg-green-500 text-white px-6 py-4 rounded-lg hover:bg-green-600">
                        <i class="fas fa-file-csv text-2xl mb-2"></i>
                        <p class="font-semibold">Export to CSV</p>
                        <p class="text-sm text-green-100">All check results</p>
                    </button>
                    <button class="bg-blue-500 text-white px-6 py-4 rounded-lg hover:bg-blue-600">
                        <i class="fas fa-file-excel text-2xl mb-2"></i>
                        <p class="font-semibold">Export to Excel</p>
                        <p class="text-sm text-blue-100">Formatted spreadsheet</p>
                    </button>
                    <button class="bg-orange-500 text-white px-6 py-4 rounded-lg hover:bg-orange-600">
                        <i class="fas fa-file-pdf text-2xl mb-2"></i>
                        <p class="font-semibold">Export to PDF</p>
                        <p class="text-sm text-orange-100">Printable report</p>
                    </button>
                </div>
            </div>

            <!-- Scheduled Tasks -->
            <div>
                <h2 class="text-xl font-bold mb-4">Scheduled Tasks</h2>
                <div class="bg-gray-50 p-6 rounded-lg">
                    <div class="space-y-4">
                        <div class="flex items-center justify-between p-4 bg-white rounded-lg border">
                            <div>
                                <p class="font-semibold">Daily Site Health Check</p>
                                <p class="text-sm text-gray-600">Test all sites daily at 3 AM</p>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer" checked>
                                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-600"></div>
                            </label>
                        </div>
                        <div class="flex items-center justify-between p-4 bg-white rounded-lg border">
                            <div>
                                <p class="font-semibold">Weekly Proxy Test</p>
                                <p class="text-sm text-gray-600">Test all proxies weekly</p>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer">
                                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-600"></div>
                            </label>
                        </div>
                        <div class="flex items-center justify-between p-4 bg-white rounded-lg border">
                            <div>
                                <p class="font-semibold">Monthly Backup</p>
                                <p class="text-sm text-gray-600">Auto-backup on 1st of month</p>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer" checked>
                                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-600"></div>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
