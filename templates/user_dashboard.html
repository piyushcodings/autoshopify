<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Shopify Captcha Checker</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen">
        <!-- Top Navigation -->
        <nav class="gradient-bg text-white shadow-lg">
            <div class="container mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <i class="fas fa-credit-card text-2xl"></i>
                    <div>
                        <h1 class="text-xl font-bold">User Dashboard</h1>
                        <p class="text-sm opacity-80">Shopify Captcha Checker</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="usernameDisplay" class="text-sm opacity-80">User</span>
                    <button onclick="logout()" class="bg-white bg-opacity-20 px-4 py-2 rounded-lg hover:bg-opacity-30 transition">
                        <i class="fas fa-sign-out-alt mr-2"></i>Logout
                    </button>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="container mx-auto px-4 py-8">
            <!-- Stats Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Total Checks</p>
                            <p class="text-2xl font-bold text-blue-600" id="totalChecks">0</p>
                        </div>
                        <div class="bg-blue-100 p-4 rounded-lg">
                            <i class="fas fa-search text-blue-600 text-2xl"></i>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-lg p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Approved</p>
                            <p class="text-2xl font-bold text-green-600" id="approvedCount">0</p>
                        </div>
                        <div class="bg-green-100 p-4 rounded-lg">
                            <i class="fas fa-check-circle text-green-600 text-2xl"></i>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-lg p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Declined</p>
                            <p class="text-2xl font-bold text-red-600" id="declinedCount">0</p>
                        </div>
                        <div class="bg-red-100 p-4 rounded-lg">
                            <i class="fas fa-times-circle text-red-600 text-2xl"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- CC Checker -->
            <div class="bg-white rounded-xl shadow-lg p-8 mb-8">
                <h2 class="text-2xl font-bold mb-6 flex items-center">
                    <i class="fas fa-credit-card text-blue-600 mr-3"></i>
                    Check Credit Card
                </h2>

                <form id="checkerForm" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                <i class="fas fa-credit-card mr-2 text-blue-600"></i>Credit Card
                            </label>
                            <input type="text" id="cc" placeholder="4400662138120147|10|27|075" 
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                <i class="fas fa-store mr-2 text-blue-600"></i>Shop URL
                            </label>
                            <input type="text" id="site" placeholder="https://shop-name.myshopify.com" 
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-user-secret mr-2 text-blue-600"></i>Proxy (Optional)
                        </label>
                        <input type="text" id="proxy" placeholder="host:port:user:pass" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div class="flex space-x-4">
                        <button type="submit" id="checkBtn" 
                            class="gradient-bg text-white px-8 py-3 rounded-lg font-semibold hover:opacity-90 transition flex items-center">
                            <i class="fas fa-play mr-2"></i>
                            <span>Start Check</span>
                        </button>
                        <button type="button" onclick="document.getElementById('checkerForm').reset()" 
                            class="bg-gray-200 text-gray-700 px-8 py-3 rounded-lg font-semibold hover:bg-gray-300 transition">
                            <i class="fas fa-trash mr-2"></i>Clear
                        </button>
                    </div>
                </form>

                <div id="resultSection" class="mt-8 hidden">
                    <h3 class="text-xl font-bold mb-4">Results</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="resultsGrid"></div>
                </div>
            </div>

            <!-- History -->
            <div class="bg-white rounded-xl shadow-lg p-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold flex items-center">
                        <i class="fas fa-history text-purple-600 mr-3"></i>
                        Check History
                    </h2>
                    <button onclick="clearHistory()" class="text-red-600 hover:text-red-800">
                        <i class="fas fa-trash mr-2"></i>Clear History
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-100">
                            <tr>
                                <th class="px-4 py-3 text-left">Time</th>
                                <th class="px-4 py-3 text-left">Card</th>
                                <th class="px-4 py-3 text-left">Shop</th>
                                <th class="px-4 py-3 text-left">Status</th>
                                <th class="px-4 py-3 text-left">Response</th>
                            </tr>
                        </thead>
                        <tbody id="historyTable">
                            <tr><td colspan="5" class="px-4 py-8 text-center text-gray-500">No checks yet</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Check authentication
        const userToken = localStorage.getItem('userToken');
        const username = localStorage.getItem('username') || 'User';
        
        if (!userToken) {
            window.location.href = '/user/login';
        }

        document.getElementById('usernameDisplay').textContent = username;

        // Stats
        let stats = {
            total: 0,
            approved: 0,
            declined: 0
        };

        // History
        let history = JSON.parse(localStorage.getItem('checkHistory') || '[]');

        // Load history
        function loadHistory() {
            const tbody = document.getElementById('historyTable');
            if (history.length > 0) {
                tbody.innerHTML = history.slice(0, 50).reverse().map(item => `
                    <tr class="border-t hover:bg-gray-50">
                        <td class="px-4 py-3 text-sm">${new Date(item.time).toLocaleString()}</td>
                        <td class="px-4 py-3 font-mono text-sm">${item.card.substring(0, 8)}******${item.card.substring(item.card.length - 4)}</td>
                        <td class="px-4 py-3 text-sm">${item.shop.substring(0, 30)}...</td>
                        <td class="px-4 py-3">
                            <span class="px-2 py-1 rounded text-xs font-semibold ${item.status === 'Approved' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                                ${item.status}
                            </span>
                        </td>
                        <td class="px-4 py-3 text-sm">${item.response}</td>
                    </tr>
                `).join('');
            } else {
                tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-gray-500">No checks yet</td></tr>';
            }
        }

        // CC Checker
        document.getElementById('checkerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const cc = document.getElementById('cc').value;
            const site = document.getElementById('site').value;
            const proxy = document.getElementById('proxy').value;
            const checkBtn = document.getElementById('checkBtn');
            
            checkBtn.disabled = true;
            checkBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Checking...';
            
            let url = `/process?key=md-tech&cc=${encodeURIComponent(cc)}&site=${encodeURIComponent(site)}`;
            if (proxy) url += `&proxy=${encodeURIComponent(proxy)}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                // Update stats
                stats.total++;
                if (data.status === 'Approved') stats.approved++;
                else stats.declined++;
                
                document.getElementById('totalChecks').textContent = stats.total;
                document.getElementById('approvedCount').textContent = stats.approved;
                document.getElementById('declinedCount').textContent = stats.declined;
                
                // Add to history
                history.push({
                    time: new Date().toISOString(),
                    card: cc,
                    shop: site,
                    status: data.status,
                    response: data.response
                });
                localStorage.setItem('checkHistory', JSON.stringify(history));
                loadHistory();
                
                // Display results
                const resultsGrid = document.getElementById('resultsGrid');
                resultsGrid.innerHTML = `
                    <div class="bg-gray-50 p-4 rounded-lg">
                        <p class="text-sm text-gray-600">Amount</p>
                        <p class="text-lg font-bold">${data.amount || '-'}</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-lg">
                        <p class="text-sm text-gray-600">Status</p>
                        <p class="text-lg font-bold ${data.status === 'Approved' ? 'text-green-600' : 'text-red-600'}">${data.status || '-'}</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-lg">
                        <p class="text-sm text-gray-600">Response</p>
                        <p class="text-lg">${data.response || '-'}</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-lg">
                        <p class="text-sm text-gray-600">Site</p>
                        <p class="text-lg font-bold">${data.site || '-'}</p>
                    </div>
                    ${data.captcha_solved ? `
                    <div class="bg-blue-50 p-4 rounded-lg col-span-2">
                        <p class="text-sm text-blue-600">✅ Captcha Solved Automatically</p>
                    </div>
                    ` : ''}
                `;
                
                document.getElementById('resultSection').classList.remove('hidden');
                
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                checkBtn.disabled = false;
                checkBtn.innerHTML = '<i class="fas fa-play mr-2"></i>Start Check';
            }
        });

        function clearHistory() {
            if (confirm('Clear all check history?')) {
                history = [];
                localStorage.setItem('checkHistory', '[]');
                loadHistory();
            }
        }

        function logout() {
            localStorage.removeItem('userToken');
            localStorage.removeItem('username');
            window.location.href = '/user/login';
        }

        // Initialize
        loadHistory();
    </script>
</body>
</html>
