<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Settings - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <div class="bg-white rounded-xl shadow-lg p-8">
            <h1 class="text-3xl font-bold mb-6">
                <i class="fas fa-cogs text-blue-600 mr-2"></i>Advanced Settings
            </h1>

            <!-- System Configuration -->
            <div class="mb-8">
                <h2 class="text-xl font-bold mb-4">System Configuration</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-gray-50 p-6 rounded-lg">
                        <label class="flex items-center justify-between mb-4">
                            <div>
                                <p class="font-semibold">Maintenance Mode</p>
                                <p class="text-sm text-gray-600">Disable all checking operations</p>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer">
                                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-red-600"></div>
                            </label>
                        </label>
                    </div>

                    <div class="bg-gray-50 p-6 rounded-lg">
                        <label class="flex items-center justify-between mb-4">
                            <div>
                                <p class="font-semibold">Auto Restart</p>
                                <p class="text-sm text-gray-600">Auto-restart on errors</p>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer" checked>
                                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-600"></div>
                            </label>
                        </label>
                    </div>

                    <div class="bg-gray-50 p-6 rounded-lg">
                        <label class="flex items-center justify-between mb-4">
                            <div>
                                <p class="font-semibold">Debug Mode</p>
                                <p class="text-sm text-gray-600">Enable detailed logging</p>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer">
                                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-yellow-600"></div>
                            </label>
                        </label>
                    </div>

                    <div class="bg-gray-50 p-6 rounded-lg">
                        <label class="flex items-center justify-between mb-4">
                            <div>
                                <p class="font-semibold">Rate Limiting</p>
                                <p class="text-sm text-gray-600">Limit requests per IP</p>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer" checked>
                                <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                            </label>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Rate Limiting Settings -->
            <div class="mb-8">
                <h2 class="text-xl font-bold mb-4">Rate Limiting</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-gray-50 p-6 rounded-lg">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Requests per Minute</label>
                        <input type="number" value="60" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="bg-gray-50 p-6 rounded-lg">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Requests per Hour</label>
                        <input type="number" value="1000" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="bg-gray-50 p-6 rounded-lg">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Block Duration (min)</label>
                        <input type="number" value="60" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
            </div>

            <!-- Email Notifications -->
            <div class="mb-8">
                <h2 class="text-xl font-bold mb-4">Email Notifications</h2>
                <div class="space-y-4">
                    <div class="bg-gray-50 p-6 rounded-lg">
                        <label class="block text-sm font-medium text-gray-700 mb-2">SMTP Host</label>
                        <input type="text" placeholder="smtp.gmail.com" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-gray-50 p-6 rounded-lg">
                            <label class="block text-sm font-medium text-gray-700 mb-2">SMTP Port</label>
                            <input type="number" placeholder="587" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="bg-gray-50 p-6 rounded-lg">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                            <input type="email" placeholder="admin@example.com" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Backup & Restore -->
            <div class="mb-8">
                <h2 class="text-xl font-bold mb-4">Backup & Restore</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-blue-50 p-6 rounded-lg">
                        <h3 class="font-bold mb-4">Backup Data</h3>
                        <p class="text-sm text-gray-600 mb-4">Export all sites, proxies, and settings</p>
                        <button class="w-full bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700">
                            <i class="fas fa-download mr-2"></i>Download Backup
                        </button>
                    </div>
                    <div class="bg-green-50 p-6 rounded-lg">
                        <h3 class="font-bold mb-4">Restore Data</h3>
                        <p class="text-sm text-gray-600 mb-4">Import from backup file</p>
                        <button class="w-full bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700">
                            <i class="fas fa-upload mr-2"></i>Upload Backup
                        </button>
                    </div>
                </div>
            </div>

            <!-- System Actions -->
            <div class="mb-8">
                <h2 class="text-xl font-bold mb-4">System Actions</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <button class="bg-yellow-500 text-white px-6 py-4 rounded-lg hover:bg-yellow-600">
                        <i class="fas fa-sync-alt text-2xl mb-2"></i>
                        <p class="font-semibold">Restart System</p>
                        <p class="text-sm text-yellow-100">Restart all services</p>
                    </button>
                    <button class="bg-red-500 text-white px-6 py-4 rounded-lg hover:bg-red-600">
                        <i class="fas fa-trash-alt text-2xl mb-2"></i>
                        <p class="font-semibold">Clear Cache</p>
                        <p class="text-sm text-red-100">Clear all cached data</p>
                    </button>
                    <button class="bg-purple-500 text-white px-6 py-4 rounded-lg hover:bg-purple-600">
                        <i class="fas fa-database text-2xl mb-2"></i>
                        <p class="font-semibold">Reset Database</p>
                        <p class="text-sm text-purple-100">Reset to defaults</p>
                    </button>
                </div>
            </div>

            <!-- Save Button -->
            <div class="flex justify-end">
                <button class="gradient-bg text-white px-8 py-3 rounded-lg font-semibold hover:opacity-90">
                    <i class="fas fa-save mr-2"></i>Save All Settings
                </button>
            </div>
        </div>
    </div>
</body>
</html>
