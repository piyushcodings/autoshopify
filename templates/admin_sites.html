<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Management - Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <div class="bg-white rounded-xl shadow-lg p-8">
            <h1 class="text-3xl font-bold mb-6">
                <i class="fas fa-globe text-blue-600 mr-2"></i>Site Management
            </h1>

            <!-- Add Site Form -->
            <div class="mb-8 p-6 bg-gray-50 rounded-lg">
                <h2 class="text-xl font-bold mb-4">Add New Site</h2>
                <form id="addSiteForm" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="siteUrl" placeholder="https://shop-name.myshopify.com" 
                        class="px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" required>
                    <input type="number" id="sitePrice" placeholder="Price ($)" step="0.01" 
                        class="px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500" required>
                    <button type="submit" class="gradient-bg text-white px-6 py-3 rounded-lg font-semibold hover:opacity-90">
                        <i class="fas fa-plus mr-2"></i>Add Site
                    </button>
                </form>
            </div>

            <!-- Sites List -->
            <div>
                <h2 class="text-xl font-bold mb-4">Available Sites</h2>
                <div class="overflow-x-auto">
                    <table class="w-full bg-white border rounded-lg">
                        <thead class="bg-gray-100">
                            <tr>
                                <th class="px-4 py-3 text-left">URL</th>
                                <th class="px-4 py-3 text-left">Price</th>
                                <th class="px-4 py-3 text-left">Last Response</th>
                                <th class="px-4 py-3 text-left">Added By</th>
                                <th class="px-4 py-3 text-left">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="sitesTable">
                            <tr>
                                <td colspan="5" class="px-4 py-8 text-center text-gray-500">Loading sites...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = '/admin';

        // Load sites
        async function loadSites() {
            try {
                const response = await fetch('/admin/sites');
                const data = await response.json();
                
                const tbody = document.getElementById('sitesTable');
                if (data.sites && data.sites.length > 0) {
                    tbody.innerHTML = data.sites.map(site => `
                        <tr class="border-t hover:bg-gray-50">
                            <td class="px-4 py-3">${site.url || '-'}</td>
                            <td class="px-4 py-3">$${site.price || '0.00'}</td>
                            <td class="px-4 py-3 text-sm">${site.last_response || 'N/A'}</td>
                            <td class="px-4 py-3">${site.added_by_name || 'Admin'}</td>
                            <td class="px-4 py-3">
                                <button onclick="deleteSite('${site.url}')" class="text-red-600 hover:text-red-800">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-gray-500">No sites found</td></tr>';
                }
            } catch (error) {
                console.error('Error loading sites:', error);
            }
        }

        // Add site
        document.getElementById('addSiteForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const url = document.getElementById('siteUrl').value;
            const price = document.getElementById('sitePrice').value;
            
            try {
                const response = await fetch('/admin/sites', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url, price})
                });
                const data = await response.json();
                
                if (data.success) {
                    alert('Site added successfully!');
                    loadSites();
                    this.reset();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Error adding site: ' + error.message);
            }
        });

        // Delete site
        async function deleteSite(url) {
            if (!confirm('Are you sure you want to delete this site?')) return;
            
            try {
                const response = await fetch('/admin/sites', {
                    method: 'DELETE',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url})
                });
                const data = await response.json();
                
                if (data.success) {
                    alert('Site deleted successfully!');
                    loadSites();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Error deleting site: ' + error.message);
            }
        }

        // Initialize
        loadSites();
    </script>
</body>
</html>
